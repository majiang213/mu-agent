name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules (better-sqlite3)
        # pnpm 10 skips dependency install scripts by default; onlyBuiltDependencies
        # in package.json allows it, but rebuild explicitly to guarantee the
        # .node binary exists (prebuild-install fetches a prebuilt binary).
        run: |
          node --version
          pnpm rebuild better-sqlite3
          echo "--- verify .node binary exists ---"
          find node_modules/.pnpm/better-sqlite3@* -name "better_sqlite3.node" -o -name "*.node" | head
          ls -la node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build/Release/ 2>/dev/null || echo "NO build/Release dir"

      - name: Build (tsc)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        # e2e tests require a running Ollama instance; excluded via vitest.config.ts.
        run: pnpm test
